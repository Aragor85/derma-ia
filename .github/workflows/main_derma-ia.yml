name: Build and Deploy Docker image to Azure Web App - derma-ia

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du code
      - uses: actions/checkout@v4

      # 2️⃣ Login sur Azure avec SERVICE_PRINCIPAL
      - name: 'Login to Azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZUREAPPSERVICE_CREDENTIALS }}
          auth-type: SERVICE_PRINCIPAL

      # 3️⃣ Login sur ACR
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: dermatologieia.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4️⃣ Build Docker image
      - name: Build Docker image
        run: |
          docker build -t dermatologieia.azurecr.io/derma-ia:latest .

      # 5️⃣ Push Docker image sur ACR
      - name: Push Docker image
        run: |
          docker push dermatologieia.azurecr.io/derma-ia:latest

      # 6️⃣ Déploiement sur Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'derma-ia'
          images: 'dermatologieia.azurecr.io/derma-ia:latest'
