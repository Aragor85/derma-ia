name: Deploy to Azure - derma-ia

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # Obligatoire pour OIDC
      contents: read    # Pour pouvoir lire le code source

    steps:
      # 1. Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Connexion Azure avec OIDC
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 3. Build et push vers ACR (si tu utilises Docker)
      - name: Build and Push Docker image
        uses: azure/docker-login@v1
        with:
          login-server: voitureautonome.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - run: |
          docker build -t voitureautonome.azurecr.io/derma-ia:${{ github.sha }} .
          docker push voitureautonome.azurecr.io/derma-ia:${{ github.sha }}

      # 4. Déploiement sur Azure App Service
      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v2
        with:
          app-name: derma-ia
          images: voitureautonome.azurecr.io/derma-ia:${{ github.sha }}
