name: Build and Deploy Docker image to Azure Web App - derma-ia

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      #  1️Récupérer le code source
      - uses: actions/checkout@v4

      # 2️Login sur Azure via Service Principal
      - name: 'Login to Azure'
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZUREAPPSERVICE_CLIENTID }}",
              "clientSecret": "${{ secrets.AZUREAPPSERVICE_CLIENTSECRET }}",
              "subscriptionId": "${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}",
              "tenantId": "${{ secrets.AZUREAPPSERVICE_TENANTID }}"
            }

      # 3️Login sur Azure Container Registry (ACR)
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: dermatologieia.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4️Build de l'image Docker
      - name: Build Docker image
        run: |
          docker build -t dermatologieia.azurecr.io/derma-ia:latest .

      # 5️Push de l'image Docker sur ACR
      - name: Push Docker image
        run: |
          docker push dermatologieia.azurecr.io/derma-ia:latest

      # 6️Déploiement sur Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'derma-ia'
          images: 'dermatologieia.azurecr.io/derma-ia:latest'
