name: Deploy to Azure - derma-ia

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # 1️ Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️ Connexion à Azure via OIDC
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 3️ Login sur ACR dermatologieia
      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: dermatologieia.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4️ Build et push de l’image Docker (tag latest)
      - name: Build and Push Docker image
        run: |
          docker build -t dermatologieia.azurecr.io/derma-ia:latest .
          docker push dermatologieia.azurecr.io/derma-ia:latest

      # 5️ Déploiement sur Azure App Service avec l’image latest
      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v3
        with:
          app-name: derma-ia
          images: dermatologieia.azurecr.io/derma-ia:latest
