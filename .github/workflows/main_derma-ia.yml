name: Build and Deploy Docker image to Azure Web App - derma-ia

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code source
      - uses: actions/checkout@v4

      # 2️⃣ Login sur Azure via Service Principal
      - name: 'Login to Azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}
          client-secret: ${{ secrets.AZUREAPPSERVICE_CLIENTSECRET }}
          auth-type: service-principal

      # 3️⃣ Login sur Azure Container Registry (ACR)
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: dermatologieia.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4️⃣ Build de l'image Docker
      - name: Build Docker image
        run: |
          docker build -t dermatologieia.azurecr.io/derma-ia:latest .

      # 5️⃣ Push de l'image Docker sur ACR
      - name: Push Docker image
        run: |
          docker push dermatologieia.azurecr.io/derma-ia:latest

      # 6️⃣ Déploiement sur Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'derma-ia'
          images: 'dermatologieia.azurecr.io/derma-ia:latest'

# 🔹 Notes importantes :
# - Toutes les dépendances Python sont installées dans le Dockerfile via requirements.txt
# - Assure-toi que le port exposé dans Dockerfile (ENV PORT=8080) correspond au port configuré dans Azure Web App
# - Si requirements.txt ou Dockerfile change, le workflow rebuild et push automatiquement l'image mise à jour
