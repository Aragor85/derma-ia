name: Build and Deploy Docker image to Azure Web App - derma-ia

on:
  push:
    branches:
      - main
  workflow_dispatch:
  
 permissions:
  id-token: write
  contents: read 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code source
      - uses: actions/checkout@v4

      # 2️⃣ Login sur Azure
      - name: 'Login to Azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      # 3️⃣ Login sur Azure Container Registry (ACR)
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: dermatologieia.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4️⃣ Build de l'image Docker
      - name: Build Docker image
        run: |
          docker build -t dermatologieia.azurecr.io/derma-ia:latest .

      # 5️⃣ Push de l'image Docker sur ACR
      - name: Push Docker image
        run: |
          docker push dermatologieia.azurecr.io/derma-ia:latest

      # 6️⃣ Déploiement sur Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'derma-ia'
          images: 'dermatologieia.azurecr.io/derma-ia:latest'

      # 🔹 Notes :
      # - Toutes les dépendances Python sont installées dans le Dockerfile, 
      #   donc pas besoin de pip install dans le workflow.
      # - Si requirements.txt ou le code change, le workflow rebuild automatiquement 
      #   et push l'image mise à jour sur ACR.
      # - Le port exposé dans Dockerfile (ENV PORT=8080) doit correspondre à celui 
      #   configuré dans Azure Web App (par défaut 80 ou 8080 selon la configuration).
