name: Build and Deploy Docker image to Azure Web App - derma-ia

on:
  push:
    branches:
      - main
  workflow_dispatch:  # permet aussi de déclencher manuellement depuis GitHub Actions

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code source
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2️⃣ Login sur Azure avec Service Principal
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: >
            {
              "clientId": "${{ secrets.AZUREAPPSERVICE_CLIENTID }}",
              "clientSecret": "${{ secrets.AZUREAPPSERVICE_CLIENTSECRET }}",
              "subscriptionId": "${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}",
              "tenantId": "${{ secrets.AZUREAPPSERVICE_TENANTID }}"
            }

      # 3️⃣ Login sur Azure Container Registry (ACR)
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: dermatologieia.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4️⃣ Build de l’image Docker
      - name: Build Docker image
        run: |
          docker build \
            --build-arg CACHEBUST=$(date +%s) \
            -t dermatologieia.azurecr.io/derma-ia:latest .

      # 5️⃣ Push de l’image Docker sur ACR
      - name: Push Docker image
        run: docker push dermatologieia.azurecr.io/derma-ia:latest

      # 6️⃣ Déploiement sur Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'derma-ia'
          images: 'dermatologieia.azurecr.io/derma-ia:latest'
